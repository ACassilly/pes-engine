vendor: sol-ark
category: inverters
strategies:
  liquidation:
    trigger: "inventory < 5 AND last_replenishment > 180 days"
    message: "This product is available for a limited time at reduced pricing. Once current stock is depleted, it will no longer be available."
    badge: "🔥 Only {inventory} Left"
    compare_at_price: msrp
    price: "gold_cost * 1.05"
  
  clearance:
    trigger: "inventory > 5 AND discontinued_date < 365 days"
    message: "This product is being cleared at a special price. Available while supplies last — no backorders."
    badge: "🏷️ Clearance"
    compare_at_price: map_price
    price: "gold_cost * 1.08"
  
  discontinued_reference:
    trigger: "replacement_available AND new_generation_exists"
    message: "The manufacturer has discontinued this model. It is available for special order or booking request only. See the upgraded version below."
    badge: "⚠️ Superseded"
    routing: "auto_redirect_to_replacement"
    html_banner: true
    comparison_table: true
    comparison_benefits:
      - "All-in-one inverter with battery charger"
      - "Grid-tie and off-grid capability"
      - "Up to 15kW continuous power"
      - "Rapid generation upgrades available"
  
  legacy:
    trigger: "no_replacement_available"
    message: "This product is no longer in production by the manufacturer. It is available for special order or booking request only. Contact us for availability and lead times."
    badge: "📋 Special Order"
    hide_from_search: false
    allow_purchase: false

supersession_rules:
  - pattern: "\\bSA-5K\\b"
    replacement_pattern: "\\bSA-8K\\b"
    confidence: medium
    note: "5K may be superseded by 8K for higher power needs"
  
  - pattern: "\\bSA-8K\\b"
    replacement_pattern: "\\bSA-12K\\b"
    confidence: medium
    note: "8K may be superseded by 12K for larger systems"
  
  - pattern: "\\bSA-12K\\b"
    replacement_pattern: "\\bSA-15K\\b"
    confidence: medium
    note: "12K may be superseded by 15K for maximum capacity"

exited_brands: []

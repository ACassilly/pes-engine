vendor: rec
category: solar-panels
strategies:
  liquidation:
    trigger: "inventory < 10 AND last_replenishment > 180 days"
    message: "This panel is available for a limited time at reduced pricing. Once current stock is depleted, it will no longer be available."
    badge: "🔥 Only {inventory} Left"
    compare_at_price: msrp
    price: "gold_cost * 1.05"
    unit_pricing: "$/W"
  
  clearance:
    trigger: "inventory > 10 AND discontinued_date < 365 days"
    message: "This panel is being cleared at a special price. Available while supplies last — no backorders."
    badge: "🏷️ Clearance"
    compare_at_price: map_price
    price: "gold_cost * 1.08"
    unit_pricing: "$/W"
  
  discontinued_reference:
    trigger: "replacement_available AND new_generation_exists"
    message: "This panel model has been superseded by the manufacturer. The newer generation offers improved efficiency and performance."
    badge: "⚠️ Superseded"
    routing: "auto_redirect_to_replacement"
    html_banner: true
    comparison_table: true
    comparison_benefits:
      - "Higher efficiency (up to 22.3%)"
      - "Heterojunction (HJT) cell technology"
      - "Better temperature performance"
      - "Enhanced warranty (up to 25 years product, 30 years performance)"
      - "Lower degradation rate"
  
  legacy:
    trigger: "no_replacement_available"
    message: "This panel is no longer in production by the manufacturer. It is available for special order or booking request only. Contact us for availability and lead times."
    badge: "📋 Special Order"
    hide_from_search: false
    allow_purchase: false

supersession_rules:
  - pattern: "\\bTwinPeak\\b"
    replacement_pattern: "\\bAlpha\\b"
    confidence: high
    note: "TwinPeak superseded by Alpha series"
  
  - pattern: "\\bAlpha\\b"
    replacement_pattern: "\\bAlpha\\s*Pure\\b"
    confidence: high
    note: "Alpha superseded by Alpha Pure with improved technology"
  
  - pattern: "\\bN-Peak\\b"
    replacement_pattern: "\\bAlpha\\b"
    confidence: high
    note: "N-Peak superseded by Alpha series"
  
  - pattern: "\\bPure-R\\b"
    replacement_pattern: "\\bAlpha\\s*Pure\\b"
    confidence: high
    note: "Pure-R superseded by Alpha Pure"

exited_brands: []
